<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History — Crop AI</title>

    <style>
        body {
            margin: 0;
            background: #0d1117;
            font-family: Poppins, Arial;
            color: #eee;
            display: flex;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 25px;
            background: #111827;
            border-right: 1px solid #1f2937;
        }

        .logo {
            color: #4f8ef7;
            font-size: 24px;
            margin-bottom: 35px;
            font-weight: bold;
        }

        .menu a {
            display: block;
            padding: 12px;
            color: #d1d5db;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .menu a:hover {
            background: #1f2937;
            color: #fff;
        }

        .content {
            margin-left: 280px;
            padding: 30px;
        }

        .card {
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 0 10px #00000050;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #1f2937;
        }

        th {
            background: #1f2937;
        }

        .download-btn, .filter-btn {
            padding: 10px 15px;
            background: #4f8ef7;
            color: white;
            border: none;
            border-radius: 6px;
            margin-right: 10px;
            cursor: pointer;
        }

        input {
            padding: 10px;
            width: 200px;
            margin-right: 15px;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        body.light {
            background: #f3f4f6;
            color: #111;
        }

        body.light .card {
            background: #fff;
        }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">🌾 Crop AI</div>

    <div class="menu">
        <a href="/">🏠 Predict</a>
        <a href="/analytics">📊 Analytics</a>
        <a href="/dataset">📂 Dataset</a>
        <a href="/history">⏱ History</a>
    </div>

    <button class="filter-btn" onclick="toggleMode()">Toggle Light/Dark</button>
</div>

<div class="content">
    <h1>Prediction History</h1>

    <div class="card">

        <input type="text" id="searchBox" placeholder="Search crop…">

        <button class="download-btn" onclick="downloadHistory()">⬇ Download History</button>

        <table id="historyTable">
            <thead>
                <tr>
                    <th>Crop</th>
                    <th>N</th>
                    <th>P</th>
                    <th>K</th>
                    <th>Temperature</th>
                    <th>Humidity</th>
                    <th>pH</th>
                    <th>Rainfall</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
                {% for row in history %}
                <tr>
                    <td>{{ row.crop }}</td>
                    <td>{{ row.N }}</td>
                    <td>{{ row.P }}</td>
                    <td>{{ row.K }}</td>
                    <td>{{ row.temperature }}</td>
                    <td>{{ row.humidity }}</td>
                    <td>{{ row.ph }}</td>
                    <td>{{ row.rainfall }}</td>
                    <td>{{ row.date }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("light");
}

document.getElementById("searchBox").addEventListener("keyup", function () {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#historyTable tbody tr");

    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
    });
});

function downloadHistory() {
    window.location.href = "/download_history";
}
</script>

</body>
</html>
